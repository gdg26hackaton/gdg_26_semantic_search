<!DOCTYPE html>
<html>
<head>
    <title>Semantic Search Agent</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; }
        #chat { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .user { color: blue; }
        .agent { color: green; }
    </style>
</head>
<body>
    <h1>Semantic Search Agent</h1>
    
    <h2>Ingest Document</h2>
    <form id="ingestForm">
        <input type="file" id="fileInput" required>
        <input type="text" id="titleInput" placeholder="Document Title" required>
        <button type="submit">Ingest</button>
    </form>
    
    <hr>
    
    <h2>Chat</h2>
    <div id="chat"></div>
    <input type="text" id="messageInput" placeholder="Ask a question...">
    <button onclick="sendMessage()">Send</button>

    <script>
        const chat = document.getElementById('chat');
        const ws = new WebSocket('ws://localhost:8000/ws/chat');
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'chat') {
                    const div = document.createElement('div');
                    div.className = 'agent';
                    div.innerText = 'Agent: ' + data.payload;
                    chat.appendChild(div);
                } else if (data.type === 'client_action') {
                    const action = data.payload;
                    
                    const div = document.createElement('div');
                    div.className = 'agent';
                    div.style.color = '#e67e22'; // Orange for system actions
                    div.innerHTML = `<em>⚙️ Executing Client Tool: <strong>${action.tool_name}</strong></em><br><pre style="font-size: 0.8em">${JSON.stringify(action.payload, null, 2)}</pre>`;
                    chat.appendChild(div);

                    if (action.tool_name === 'cli_show_documents') {
                        // TODO: Implement actual UI overlay for documents
                        console.log("Showing Documents:", action.payload.documents);
                    } else if (action.tool_name === 'cli_preview_template') {
                        // TODO: Implement actual UI overlay for template preview
                        console.log("Previewing Template:", action.payload);
                    }
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                // Fallback for raw text
                const div = document.createElement('div');
                div.className = 'agent';
                div.innerText = 'Agent: ' + event.data;
                chat.appendChild(div);
            }
        };

        const ingestForm = document.getElementById('ingestForm');
        ingestForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);
            formData.append('title', document.getElementById('titleInput').value);
            
            const res = await fetch('http://localhost:8000/ingest', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            alert(data.response || "Done");
        };

        function sendMessage() {
            const input = document.getElementById('messageInput');
            if (!input.value.trim()) return;

            // Send JSON
            ws.send(JSON.stringify({ message: input.value }));

            const div = document.createElement('div');
            div.className = 'user';
            div.innerText = 'You: ' + input.value;
            chat.appendChild(div);
            
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
